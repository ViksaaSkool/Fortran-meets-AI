  <script>
    var pyodideReadyPromise = null;

    var data = {
      claude: {
        fortran: [
          { title: "Problem 1: Product Computation", desc: "Compute P = ∏(nᵏ / (k·2ᵏ)) for k = 1 to n, where n > 10. Verification uses P = ((n/2)^(n(n+1)/2)) / n!.", code: "C     PROBLEM 1 — PRODUCT P = PROD(K=1..N) N**K / (K * 2**K)\nC     INPUT CARD: N IN COLUMNS 1-5 (I5)\n      PROGRAM PROB1\n      DOUBLE PRECISION P, RPOW, RATIO\n      INTEGER N, K\nC\n      READ(5, 100) N\n  100 FORMAT(I5)\n      IF (N .LE. 10) THEN\n          WRITE(6, *) 'ERROR: N MUST BE GREATER THAN 10'\n          STOP\n      END IF\nC\n      RATIO = DBLE(N) / 2.0D0\n      P    = 1.0D0\n      RPOW = 1.0D0\n      DO 10 K = 1, N\n          RPOW = RPOW * RATIO\n          P    = P * RPOW / DBLE(K)\n   10 CONTINUE\nC\n      WRITE(6, 200) N, P\n  200 FORMAT(1X, 'N =', I5, 2X, 'P =', D25.16)\n      STOP\n      END" },
          { title: "Problem 2: Function Tabulation", desc: "Tabulate y = (2 + sin(x)) / x on [-5/6, 4π/5] with step π/4, guarding the singularity at x = 0.", code: "C     PROBLEM 2 — TABULATE Y = (2 + SIN(X)) / X\n      PROGRAM PROB2\n      DOUBLE PRECISION PI, A, B, H, X, Y, EPS\n      PARAMETER (PI = 3.14159D0, EPS = 1.0D-9)\nC\n      A = -5.0D0 / 6.0D0\n      B =  4.0D0 * PI / 5.0D0\n      H =  PI / 4.0D0\nC\n      WRITE(6, 100)\n  100 FORMAT(1X, 'X', 14X, 'Y')\n      WRITE(6, 101)\n  101 FORMAT(1X, 32('-'))\nC\n      X = A\n   10 IF (X .GT. B + EPS) GOTO 30\n          IF (DABS(X) .LT. EPS) THEN\n              WRITE(6, 200) X\n  200         FORMAT(1X, F12.6, 4X, '** UNDEFINED (X~0) **')\n          ELSE\n              Y = (2.0D0 + DSIN(X)) / X\n              WRITE(6, 300) X, Y\n  300         FORMAT(1X, F12.6, 2X, F14.6)\n          END IF\n          X = X + H\n      GOTO 10\n   30 CONTINUE\n      STOP\n      END" },
          { title: "Problem 3: Sum of Squares and Vector Norm", desc: "Compute S = Σaₖ² with a function subprogram, then compute ||x|| = √S. Verification example: x = (3, 4) gives norm 5.", code: "C     ====================================================\nC     FUNCTION SUMSQ: RETURNS SUM OF SQUARES OF A(1..M)\nC     ====================================================\n      DOUBLE PRECISION FUNCTION SUMSQ(A, M)\n      INTEGER M, K\n      DOUBLE PRECISION A(M)\n      SUMSQ = 0.0D0\n      DO 10 K = 1, M\n          SUMSQ = SUMSQ + A(K) ** 2\n   10 CONTINUE\n      RETURN\n      END\n\nC     ====================================================\nC     MAIN PROGRAM: READ VECTOR, COMPUTE NORM VIA SUMSQ\nC     ====================================================\n      PROGRAM PROB3\n      INTEGER M, J\n      DOUBLE PRECISION X(100), XNORM, SUMSQ\n      EXTERNAL SUMSQ\nC\n      READ(5, 100) M\n  100 FORMAT(I5)\n      IF (M .LT. 1 .OR. M .GT. 100) THEN\n          WRITE(6, *) 'ERROR: M MUST BE 1..100'\n          STOP\n      END IF\n      READ(5, 200) (X(J), J = 1, M)\n  200 FORMAT(10F8.2)\nC\n      XNORM = DSQRT(SUMSQ(X, M))\n      WRITE(6, 300) M, XNORM\n  300 FORMAT(1X, 'M =', I4, 2X, '||X|| =', F15.6)\n      STOP\n      END" },
          { title: "Problem 4: Minimum Element of a Vector", desc: "Interpret the blurred task as finding the smallest element of a vector and its 1-based index.", code: "C     ====================================================\nC     SUBROUTINE FINDMN — FIND MINIMUM ELEMENT OF A(1..N)\nC     RETURNS AMIN = SMALLEST VALUE, IDX = ITS INDEX\nC     ====================================================\n      SUBROUTINE FINDMN(A, N, AMIN, IDX)\n      INTEGER N, IDX, K\n      DOUBLE PRECISION A(N), AMIN\nC\n      AMIN = A(1)\n      IDX  = 1\n      DO 10 K = 2, N\n          IF (A(K) .LT. AMIN) THEN\n              AMIN = A(K)\n              IDX  = K\n          END IF\n   10 CONTINUE\n      RETURN\n      END\n\nC     --- DRIVER TO TEST ---\n      PROGRAM PROB4\n      INTEGER N, J, IDX\n      DOUBLE PRECISION X(100), XMIN\nC\n      READ(5, 100) N\n  100 FORMAT(I5)\n      READ(5, 200) (X(J), J = 1, N)\n  200 FORMAT(10F8.2)\n      CALL FINDMN(X, N, XMIN, IDX)\n      WRITE(6, 300) XMIN, IDX\n  300 FORMAT(1X, 'MIN =', F12.4, '  AT INDEX', I4)\n      STOP\n      END" },
          { title: "Problem 5: Mean of the Smallest Elements", desc: "Compute the arithmetic mean of the minimum elements of m vectors. Exam sample gives (-6 + 2) / 2 = -2.", code: "C     ====================================================\nC     SUBROUTINE FINDMN — (from Problem 4, linked here)\nC     ====================================================\n      SUBROUTINE FINDMN(A, N, AMIN, IDX)\n      INTEGER N, IDX, K\n      DOUBLE PRECISION A(N), AMIN\n      AMIN = A(1)\n      IDX  = 1\n      DO 10 K = 2, N\n          IF (A(K) .LT. AMIN) THEN\n              AMIN = A(K)\n              IDX  = K\n          END IF\n   10 CONTINUE\n      RETURN\n      END\n\nC     ====================================================\nC     MAIN PROGRAM — MEAN OF SMALLEST ELEMENTS\nC     ====================================================\n      PROGRAM PROB5\n      INTEGER M, I, J, NI, IDX\n      DOUBLE PRECISION X(100), XMIN, SUMMIN, AMEAN\nC\n      READ(5, 100) M\n  100 FORMAT(I5)\nC\n      SUMMIN = 0.0D0\n      DO 30 I = 1, M\n          READ(5, 100) NI\n          READ(5, 200) (X(J), J = 1, NI)\n  200     FORMAT(10F8.2)\n          CALL FINDMN(X, NI, XMIN, IDX)\n          WRITE(6, 300) I, XMIN\n  300     FORMAT(1X, 'VECTOR', I3, ':  MIN =', F10.4)\n          SUMMIN = SUMMIN + XMIN\n   30 CONTINUE\nC\n      AMEAN = SUMMIN / DBLE(M)\n      WRITE(6, 400) AMEAN\n  400 FORMAT(1X, 'ARITHMETIC MEAN OF MINS =', F10.4)\n      STOP\n      END" }
        ],
        python: [
          { title: "Problem 1: Product Computation", desc: "Compute P = ∏(nᵏ / (k·2ᵏ)) for k = 1 to n, where n > 10. Verification uses P = ((n/2)^(n(n+1)/2)) / n!.", code: "import math\n\ndef compute_product(n: int) -> float:\n    \"\"\"Compute P = prod(k=1..n) n**k / (k * 2**k).\"\"\"\n    if n <= 10:\n        raise ValueError(\"n must be greater than 10\")\n    ratio = n / 2.0\n    P = 1.0\n    rpow = 1.0\n    for k in range(1, n + 1):\n        rpow *= ratio\n        P *= rpow / k\n    return P\n\n# --- sample run ---\nn = 11\nP = compute_product(n)\nprint(f\"n = {n}  P = {P:.16e}\")\n\n# --- verification via closed form ---\nP_check = (n / 2.0) ** (n * (n + 1) // 2) / math.factorial(n)\nprint(f\"Verification (closed form): P = {P_check:.16e}\")" },
          { title: "Problem 2: Function Tabulation", desc: "Tabulate y = (2 + sin(x)) / x on [-5/6, 4π/5] with step π/4, guarding the singularity at x = 0.", code: "import math\n\nPI  = 3.14159\nEPS = 1e-9\n\na = -5.0 / 6.0          # start\nb =  4.0 * PI / 5.0     # end\nh =  PI / 4.0           # step\n\nprint(f\"{'x':>12s}  {'y':>14s}\")\nprint(\"-\" * 30)\n\nx = a\nwhile x <= b + EPS:\n    if abs(x) < EPS:\n        print(f\"{x:12.6f}  {'UNDEFINED (x≈0)':>14s}\")\n    else:\n        y = (2.0 + math.sin(x)) / x\n        print(f\"{x:12.6f}  {y:14.6f}\")\n    x += h" },

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlight(code, lang) {
      var h = escapeHtml(code);
      if (lang === 'fortran') {
        h = h.replace(/\b(PROGRAM|INTEGER|REAL|READ|PRINT|DO|END|IF|STOP|GOTO|FLOAT)\b/g, '<span class="keyword">$1</span>');
        h = h.replace(/!.*$/gm, '<span class="comment">$&</span>');
      } else if (lang === 'python') {
        h = h.replace(/\b(def|return|if|else|import|from|for|while|in)\b/g, '<span class="keyword">$1</span>');
        h = h.replace(/#.*$/gm, '<span class="comment">$&</span>');
        h = h.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
      } else if (lang === 'kotlin') {
        h = h.replace(/\b(fun|val|var|if|else|for|while|return|import)\b/g, '<span class="keyword">$1</span>');
        h = h.replace(/\/\/.*$/gm, '<span class="comment">$&</span>');
      }
      return h;
    }

      }

      function fallbackCopy(text) {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'absolute';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        markCopied();
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(markCopied).catch(function() {
          fallbackCopy(code);
        });
      } else {
        fallbackCopy(code);
      }
    }

    var toastTimer;
    function showToast(message) {
      var toast = document.getElementById('toast');
      if (!toast) return;

      toast.textContent = message;
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() {
        toast.classList.remove('visible');
      }, 1800);
    }

    function ensurePyodide() {
      if (pyodideReadyPromise) return pyodideReadyPromise;

      pyodideReadyPromise = new Promise(function(resolve, reject) {
        function loadRuntime() {
          loadPyodide({
            indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.2/full/'
          }).then(function(instance) {
            pyodideInstance = instance;
            resolve(instance);
          }).catch(reject);
        }

        if (window.loadPyodide) {
          loadRuntime();
          return;
        }

        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js';
        script.onload = loadRuntime;
        script.onerror = function() {
          reject(new Error('Failed to load Pyodide'));
        };
        document.head.appendChild(script);
      });

      return pyodideReadyPromise;
    }

    async function runPython(button) {
      var code = decodeURIComponent(button.getAttribute('data-code') || '');
      var outputId = button.getAttribute('data-output-id');
      var output = document.getElementById(outputId);
      if (!output) return;

      var timeNode = output.querySelector('.run-time');
      var bodyNode = output.querySelector('.run-output-body');

      button.disabled = true;
      button.textContent = 'Running';
      output.classList.remove('hidden');
      timeNode.textContent = 'Loading runtime...';
      bodyNode.textContent = '';

      try {
        var pyodide = await ensurePyodide();
        var lines = [];

        pyodide.setStdout({
          batched: function(text) {
            lines.push(text);
          }
        });
        pyodide.setStderr({
          batched: function(text) {
            lines.push(text);
          }
        });

        var start = performance.now();
        await pyodide.runPythonAsync(code);
        var duration = performance.now() - start;

        bodyNode.textContent = lines.join('\n').trim() || '(no output)';
        timeNode.textContent = 'Completed in ' + duration.toFixed(2) + ' ms';
      } catch (error) {
        timeNode.textContent = 'Execution failed';
        bodyNode.textContent = String(error);
      } finally {
        button.disabled = false;
        button.textContent = 'Run';
      }
    }

    function render() {
      var models = Object.keys(data);
      var langs = ['fortran', 'python', 'kotlin'];
      
      models.forEach(function(model) {
        langs.forEach(function(lang) {
          var container = document.getElementById(model + '-' + lang);
          if (!container) return;
          
          var problems = data[model][lang];
          var html = '';
          problems.forEach(function(p) {
            var outputId = model + '-' + lang + '-' + p.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            var encodedCode = encodeURIComponent(p.code);
            html += '<div class="problem">';
            html += '<h2>' + escapeHtml(p.title) + '</h2>';
            html += '<p>' + escapeHtml(p.desc) + '</p>';
            html += '<div class="code-block">';
            html += '<div class="code-actions">';
            if (lang === 'python') {
              html += '<button class="copy-btn run-btn" type="button" data-code="' + encodedCode + '" data-output-id="' + escapeHtml(outputId) + '" onclick="runPython(this)">Run</button>';
            }
            html += '<button class="copy-btn" type="button" aria-label="Copy code" data-code="' + encodedCode + '" onclick="copyCode(this)">';
            html += '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">';
            html += '<rect x="9" y="9" width="13" height="13" rx="2"></rect>';
            html += '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>';
            html += '</svg>';
            html += '<span class="copy-label" style="display:none;">Copy</span>';
            html += '</button>';
            html += '</div>';
            html += '<pre><code>' + highlight(p.code, lang) + '</code></pre>';
            if (lang === 'python') {
              html += '<div id="' + escapeHtml(outputId) + '" class="run-output hidden">';
              html += '<div class="run-output-header">';
              html += '<span class="run-output-title">Python Output</span>';
              html += '<span class="run-time">Not run yet</span>';
              html += '</div>';
              html += '<pre class="run-output-body"></pre>';
              html += '</div>';
            }
            html += '</div>';
            html += '</div>';
          });
          container.innerHTML = html;
        });
      });
    }

    function activateLanguageTab(model, lang) {
      var modelContainer = document.getElementById(model);
      if (!modelContainer) return;

      var langBtns = modelContainer.querySelectorAll('.lang-btn');
      langBtns.forEach(function(btn) {
        btn.classList.remove('active');
      });

      var selectedButton = modelContainer.querySelector('.lang-btn[onclick="showLang(\'' + model + '\', \'' + lang + '\')"]');
      if (selectedButton) {
        selectedButton.classList.add('active');
      }

      var langContents = modelContainer.querySelectorAll('.lang-content');
      langContents.forEach(function(content) {
        content.classList.remove('active');
      });

      var selectedContent = document.getElementById(model + '-' + lang);
      if (selectedContent) {
        selectedContent.classList.add('active');
      }
    }

    function showModel(model) {
      var tabs = document.querySelectorAll('.tabs .tab-btn');
      tabs.forEach(function(btn) { btn.classList.remove('active'); });
      event.target.classList.add('active');
      
      var contents = document.querySelectorAll('.tab-content');
      contents.forEach(function(c) { c.classList.remove('active'); });
      document.getElementById(model).classList.add('active');

      activateLanguageTab(model, selectedLangByModel[model] || 'fortran');
    }

    function showLang(model, lang) {
      selectedLangByModel[model] = lang;

      var modelContainer = document.getElementById(model);
      var langBtns = modelContainer.querySelectorAll('.lang-btn');
      langBtns.forEach(function(btn) { btn.classList.remove('active'); });
      event.target.classList.add('active');
      
      var langContents = modelContainer.querySelectorAll('.lang-content');
      langContents.forEach(function(c) { c.classList.remove('active'); });
      document.getElementById(model + '-' + lang).classList.add('active');
    }

    function toggleTheme() {
      var body = document.body;
      if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        body.classList.add('light');
      } else {
        body.classList.remove('light');
        body.classList.add('dark');
      }
    }

    render();
  </script>
</body>
</html>
