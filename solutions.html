<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solutions - Fortran meets AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'VT323', 'Courier New', monospace; 
      background: #0a0a0a;
      color: #4ade80;
      min-height: 100vh;
      padding: 20px;
      font-size: 18px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto 30px;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      color: #4ade80;
      text-decoration: none;
      font-size: 1.1rem;
      transition: opacity 0.2s;
      border: 1px solid #4ade80;
    }
    .back-btn:hover { opacity: 0.7; }
    .back-btn svg { width: 18px; height: 18px; }
    
    .theme-toggle { 
      width: 44px; height: 44px; cursor: pointer; border-radius: 50%; border: 1px solid #4ade80;
      background: transparent; color: #4ade80; font-size: 20px; display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s, background 0.3s;
    }
    .theme-toggle:hover { transform: scale(1.1); background: rgba(74, 222, 128, 0.1); }
    
    .theme-toggle .icon { display: block; }
    .theme-toggle .icon-moon { display: none; }
    body.light .theme-toggle .icon-sun { display: none; }
    body.light .theme-toggle .icon-moon { display: block; }
    
    h1 { text-align: center; color: #4ade80; margin-bottom: 30px; font-size: 2rem; text-transform: uppercase; }
    body.light h1 { color: #16a34a; }
    
    .tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { padding: 12px 30px; background: transparent; border: 1px solid #4ade80; color: #4ade80; cursor: pointer; font-size: 1.1rem; font-family: inherit; }
    body.light .tab-btn { border-color: #16a34a; color: #16a34a; }
    .tab-btn:hover { background: rgba(74, 222, 128, 0.1); }
    .tab-btn.active { background: #4ade80; color: #0a0a0a; }
    body.light .tab-btn.active { background: #16a34a; color: #fff; }
    
    .tab-content { display: none; background: #111; border: 1px solid #4ade80; border-radius: 8px; padding: 20px; max-width: 900px; margin: 0 auto; }
    body.light .tab-content { background: #f5f5f5; border-color: #16a34a; }
    .tab-content.active { display: block; }
    
    .lang-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; flex-wrap: wrap; }
    body.light .lang-tabs { border-color: #ddd; }
    .lang-btn { padding: 8px 20px; background: transparent; border: 1px solid #4ade80; color: #4ade80; cursor: pointer; font-size: 0.95rem; font-family: inherit; }
    body.light .lang-btn { border-color: #16a34a; color: #16a34a; }
    .lang-btn:hover { background: rgba(74, 222, 128, 0.1); }
    .lang-btn.active { background: #4ade80; color: #0a0a0a; }
    body.light .lang-btn.active { background: #16a34a; color: #fff; }
    
    .lang-content { display: none; }
    .lang-content.active { display: block; }
    
    .problem { margin-bottom: 30px; padding: 20px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; }
    body.light .problem { background: #fff; border-color: #ddd; }
    .problem h2 { color: #4ade80; margin-bottom: 15px; font-size: 1.3rem; }
    body.light .problem h2 { color: #16a34a; }
    .problem p { color: #4ade80; opacity: 0.7; margin-bottom: 15px; line-height: 1.6; }
    body.light .problem p { color: #333; }
    pre { background: #000; padding: 15px; border-radius: 6px; overflow-x: auto; font-family: 'VT323', 'Courier New', monospace; font-size: 1rem; line-height: 1.5; border: 1px solid #333; }
    body.light pre { background: #1a1a1a; }
    
    .keyword { color: #60a5fa; }
    .comment { color: #6a9955; }
    .number { color: #b5cea8; }
    .string { color: #ce9178; }
    
    @media (max-width: 600px) {
      .header { flex-direction: column; gap: 15px; }
      .tabs { gap: 2px; }
      .tab-btn { padding: 10px 15px; font-size: 0.95rem; }
      .lang-btn { padding: 6px 12px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
    <button class="theme-toggle" onclick="toggleTheme()">
      <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </div>
  
  <h1>AI Coding Solutions</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="showModel('claude')">Claude Code</button>
    <button class="tab-btn" onclick="showModel('codex')">Codex</button>
    <button class="tab-btn" onclick="showModel('minimax')">MiniMax</button>
  </div>

  <!-- Claude -->
  <div id="claude" class="tab-content active">
    <div class="lang-tabs">
      <button class="lang-btn active" onclick="showLang('claude', 'fortran')">FORTRAN</button>
      <button class="lang-btn" onclick="showLang('claude', 'python')">PYTHON</button>
      <button class="lang-btn" onclick="showLang('claude', 'kotlin')">KOTLIN</button>
    </div>
    <div id="claude-fortran" class="lang-content active"><p style="text-align:center;padding:40px;opacity:0.5;">Coming soon...</p></div>
    <div id="claude-python" class="lang-content"><p style="text-align:center;padding:40px;opacity:0.5;">Coming soon...</p></div>
    <div id="claude-kotlin" class="lang-content"><p style="text-align:center;padding:40px;opacity:0.5;">Coming soon...</p></div>
  </div>

  <!-- Codex -->
  <div id="codex" class="tab-content">
    <div class="lang-tabs">
      <button class="lang-btn active" onclick="showLang('codex', 'fortran')">FORTRAN</button>
      <button class="lang-btn" onclick="showLang('codex', 'python')">PYTHON</button>
      <button class="lang-btn" onclick="showLang('codex', 'kotlin')">KOTLIN</button>
    </div>
    <div id="codex-fortran" class="lang-content active"><p style="text-align:center;padding:40px;opacity:0.5;">Coming soon...</p></div>
    <div id="codex-python" class="lang-content"><p style="text-align:center;padding:40px;opacity:0.5;">Coming soon...</p></div>
    <div id="codex-kotlin" class="lang-content"><p style="text-align:center;padding:40px;opacity:0.5;">Coming soon...</p></div>
  </div>

  <!-- MiniMax -->
  <div id="minimax" class="tab-content">
    <div class="lang-tabs">
      <button class="lang-btn active" onclick="showLang('minimax', 'fortran')">FORTRAN</button>
      <button class="lang-btn" onclick="showLang('minimax', 'python')">PYTHON</button>
      <button class="lang-btn" onclick="showLang('minimax', 'kotlin')">KOTLIN</button>
    </div>
    <div id="minimax-fortran" class="lang-content active"></div>
    <div id="minimax-python" class="lang-content"></div>
    <div id="minimax-kotlin" class="lang-content"></div>
  </div>

  <script>
    var data = {
      minimax: {
        fortran: [
          { title: "Problem 1: Product Computation", desc: "Compute P = ∏(n·k / (k·2ᵏ)) for k=1 to n where n > 10", code: "      PROGRAM PROD\n      INTEGER N,K\n      REAL P\n      READ(*,*) N\n      P=1.0\n      DO 10 K=1,N\n10    P=P*(FLOAT(N)*FLOAT(K))/(FLOAT(K)*2.**K)\n      PRINT *,P\n      END" },
          { title: "Problem 2: Function Tabulation", desc: "Tabulate y = (2 + sin(x)) / x for x ∈ [-5π/6, 4π/5] with step π/4", code: "      PROGRAM TAB\n      PI=3.14159\n      X=-5.*PI/6.\n10    IF(X.GT.4.*PI/5.) STOP\n      IF(ABS(X).LT.1.E-6) THEN\n        PRINT *,X,'INF'\n      ELSE\n        Y=(2.+SIN(X))/X\n        PRINT *,X,Y\n      ENDIF\n      X=X+PI/4.\n      GOTO 10\n      END" },
          { title: "Problem 3: Sum of Squares & Vector Norm", desc: "Compute S = Σaₖ² and ||x|| = √(Σxₖ²) for m ≤ 100", code: "      PROGRAM NORM\n      REAL X(100),S,N\n      READ(*,*) M\n      READ(*,*)(X(I),I=1,M)\n      S=0.\n      DO 10 I=1,M\n10    S=S+X(I)**2\n      N=SQRT(S)\n      PRINT *,S,N\n      END" }
        ],
        python: [
          { title: "Problem 1: Product Computation", desc: "Compute P = ∏(n·k / (k·2ᵏ)) for k=1 to n where n > 10", code: "n=11\np=1\nfor k in range(1,n+1):\n    p*=(n*k)/(k*2**k)\nprint(p)" },
          { title: "Problem 2: Function Tabulation", desc: "Tabulate y = (2 + sin(x)) / x for x ∈ [-5π/6, 4π/5] with step π/4", code: "import math\np=3.14159\nx=-5*p/6\nwhile x<=4*p/5:\n    y=(2+math.sin(x))/x if abs(x)>1e-6 else None\n    print(x,y)\n    x+=p/4" },
          { title: "Problem 3: Sum of Squares & Vector Norm", desc: "Compute S = Σaₖ² and ||x|| = √(Σxₖ²) for m ≤ 100", code: "import math\nx=[3,4,12,0,3]\ns=sum(v*v for v in x)\nprint(s,math.sqrt(s))" }
        ],
        kotlin: [
          { title: "Problem 1: Product Computation", desc: "Compute P = ∏(n·k / (k·2ᵏ)) for k=1 to n where n > 10", code: "fun main() {\n    var p = 1.0\n    for (k in 1..11) {\n        p *= (11.0*k)/(k*Math.pow(2.0,k.toDouble()))\n    }\n    println(p)\n}" },
          { title: "Problem 2: Function Tabulation", desc: "Tabulate y = (2 + sin(x)) / x for x ∈ [-5π/6, 4π/5] with step π/4", code: "import kotlin.math.sin\nimport kotlin.math.abs\n\nfun main() {\n    var x = -5.0*3.14159/6\n    while (x <= 4.0*3.14159/5) {\n        val y = if (abs(x)>1e-6) (2+sin(x))/x else null\n        println(\"$x $y\")\n        x += 3.14159/4\n    }\n}" },
          { title: "Problem 3: Sum of Squares & Vector Norm", desc: "Compute S = Σaₖ² and ||x|| = √(Σxₖ²) for m ≤ 100", code: "import kotlin.math.sqrt\n\nfun main() {\n    val x = listOf(3.0,4.0,12.0,0.0,3.0)\n    val s = x.map{it*it}.sum()\n    println(\"$s ${sqrt(s)}\")\n}" }
        ]
      }
    };

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlight(code, lang) {
      var h = escapeHtml(code);
      if (lang === 'fortran') {
        h = h.replace(/\b(PROGRAM|INTEGER|REAL|READ|PRINT|DO|END|IF|STOP|GOTO|FLOAT)\b/g, '<span class="keyword">$1</span>');
        h = h.replace(/!.*$/gm, '<span class="comment">$&</span>');
      } else if (lang === 'python') {
        h = h.replace(/\b(def|return|if|else|import|from|for|while|in)\b/g, '<span class="keyword">$1</span>');
        h = h.replace(/#.*$/gm, '<span class="comment">$&</span>');
        h = h.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
      } else if (lang === 'kotlin') {
        h = h.replace(/\b(fun|val|var|if|else|for|while|return|import)\b/g, '<span class="keyword">$1</span>');
        h = h.replace(/\/\/.*$/gm, '<span class="comment">$&</span>');
      }
      return h;
    }

    function render() {
      var models = ['minimax'];
      var langs = ['fortran', 'python', 'kotlin'];
      
      models.forEach(function(model) {
        langs.forEach(function(lang) {
          var container = document.getElementById(model + '-' + lang);
          if (!container) return;
          
          var problems = data[model][lang];
          var html = '';
          problems.forEach(function(p) {
            html += '<div class="problem">';
            html += '<h2>' + escapeHtml(p.title) + '</h2>';
            html += '<p>' + escapeHtml(p.desc) + '</p>';
            html += '<pre><code>' + highlight(p.code, lang) + '</code></pre>';
            html += '</div>';
          });
          container.innerHTML = html;
        });
      });
    }

    function showModel(model) {
      var tabs = document.querySelectorAll('.tabs .tab-btn');
      tabs.forEach(function(btn) { btn.classList.remove('active'); });
      event.target.classList.add('active');
      
      var contents = document.querySelectorAll('.tab-content');
      contents.forEach(function(c) { c.classList.remove('active'); });
      document.getElementById(model).classList.add('active');
      
      var modelContainer = document.getElementById(model);
      var langBtns = modelContainer.querySelectorAll('.lang-btn');
      var langContents = modelContainer.querySelectorAll('.lang-content');
      langBtns.forEach(function(b) { b.classList.remove('active'); });
      langContents.forEach(function(c) { c.classList.remove('active'); });
      if (langBtns[0]) langBtns[0].classList.add('active');
      if (langContents[0]) langContents[0].classList.add('active');
    }

    function showLang(model, lang) {
      var modelContainer = document.getElementById(model);
      var langBtns = modelContainer.querySelectorAll('.lang-btn');
      langBtns.forEach(function(btn) { btn.classList.remove('active'); });
      event.target.classList.add('active');
      
      var langContents = modelContainer.querySelectorAll('.lang-content');
      langContents.forEach(function(c) { c.classList.remove('active'); });
      document.getElementById(model + '-' + lang).classList.add('active');
    }

    function toggleTheme() {
      var body = document.body;
      if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        body.classList.add('light');
      } else {
        body.classList.remove('light');
        body.classList.add('dark');
      }
    }

    render();
  </script>
</body>
</html>
